<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0E1117"/>

  <!-- Subtle grid lines -->
  <g stroke="#FFFFFF" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent line left -->
  <line x1="55" y1="0" x2="55" y2="630" stroke="#C9A84C" stroke-width="1.5" opacity="0.25"/>

  <!-- Logo mark — triangle -->
  <line x1="130" y1="245" x2="93" y2="315" stroke="#FFFFFF" stroke-width="3" stroke-linecap="square"/>
  <line x1="130" y1="245" x2="167" y2="315" stroke="#FFFFFF" stroke-width="3" stroke-linecap="square"/>
  <line x1="93" y1="315" x2="167" y2="315" stroke="#FFFFFF" stroke-width="3" stroke-linecap="square"/>
  <circle cx="130" cy="245" r="4" fill="#C9A84C"/>

  <!-- APEX wordmark -->
  <text x="192" y="308" font-family="Georgia, serif" font-size="68" font-weight="400" letter-spacing="13" fill="#FFFFFF">APEX</text>

  <!-- SYSTEMATIC -->
  <text x="194" y="342" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="12" fill="#C9A84C">SYSTEMATIC</text>

  <!-- Divider -->
  <line x1="455" y1="230" x2="455" y2="390" stroke="#FFFFFF" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline -->
  <text x="498" y="303" font-family="Georgia, serif" font-size="40" font-weight="400" font-style="italic" fill="#FFFFFF" opacity="0.92">Still doing it manually?</text>

  <!-- Sub tagline v2 — split onto two lines to fit cleanly -->
  <text x="500" y="348" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3.5" fill="#C9A84C" opacity="0.85">AI AUTOMATION FOR PROFESSIONAL SERVICES</text>
  <text x="500" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3.5" fill="#C9A84C" opacity="0.85">&amp; GROWING BUSINESSES</text>

  <!-- Bottom right URL -->
  <text x="1140" y="582" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="300" letter-spacing="2" fill="#FFFFFF" opacity="0.3" text-anchor="end">apexsystematic.com</text>

  <!-- Decorative corner lines bottom right -->
  <line x1="1160" y1="630" x2="1200" y2="630" stroke="#C9A84C" stroke-width="1.5" opacity="0.3"/>
  <line x1="1200" y1="590" x2="1200" y2="630" stroke="#C9A84C" stroke-width="1.5" opacity="0.3"/>

</svg>
