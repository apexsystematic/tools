<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Systematic — Logo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a1a;
    }
    .panel {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50vh;
    }
    .panel.dark  { background: #0E1117; }
    .panel.light { background: #F5F5F0; }
  </style>
</head>
<body>

  <div class="panel dark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
      <line x1="54" y1="48" x2="34" y2="82" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="square"/>
      <line x1="54" y1="48" x2="74" y2="82" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="square"/>
      <line x1="34" y1="82" x2="74" y2="82" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="square"/>
      <circle cx="54" cy="48" r="2.5" fill="#C9A84C"/>
      <text x="88" y="82" font-family="'Georgia', 'Times New Roman', serif" font-size="46" font-weight="400" letter-spacing="10" fill="#FFFFFF">APEX</text>
      <text x="88" y="104" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="11" font-weight="300" letter-spacing="9.5" fill="#C9A84C">SYSTEMATIC</text>
    </svg>
  </div>

  <div class="panel light">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
      <line x1="54" y1="48" x2="34" y2="82" stroke="#0E1117" stroke-width="2.2" stroke-linecap="square"/>
      <line x1="54" y1="48" x2="74" y2="82" stroke="#0E1117" stroke-width="2.2" stroke-linecap="square"/>
      <line x1="34" y1="82" x2="74" y2="82" stroke="#0E1117" stroke-width="2.2" stroke-linecap="square"/>
      <circle cx="54" cy="48" r="2.5" fill="#C9A84C"/>
      <text x="88" y="82" font-family="'Georgia', 'Times New Roman', serif" font-size="46" font-weight="400" letter-spacing="10" fill="#0E1117">APEX</text>
      <text x="88" y="104" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="11" font-weight="300" letter-spacing="9.5" fill="#C9A84C">SYSTEMATIC</text>
    </svg>
  </div>

</body>
</html>
