<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UTM Link Generator — Apex Systematic</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:      #0E1117;
    --slate:     #131820;
    --slate-el:  #182030;
    --border:    #1E2838;
    --border-lt: #263040;
    --text:      #D8DCE4;
    --muted:     #7A8299;
    --dim:       #4F5B6E;
    --white:     #FFFFFF;
    --gold:      #C9A84C;
    --gold-lt:   #DDB95A;
    --danger-lt: #B04A4A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    color: var(--white);
    text-transform: uppercase;
  }

  .wordmark span { color: var(--gold); }

  .hd { width: 1px; height: 16px; background: var(--border-lt); }

  .tool-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 40px 80px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* GENERATOR PANEL — horizontal layout */
  .gen-panel {
    background: var(--slate);
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .gen-body {
    padding: 20px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input[type="text"], input[type="url"] {
    width: 100%;
    background: var(--slate-el);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
    height: 36px;
  }

  input:focus { border-color: var(--gold); }
  input::placeholder { color: var(--dim); }

  .preview-row {
    padding: 0 20px 16px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .preview-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .url-preview {
    flex: 1;
    font-size: 11px;
    color: var(--muted);
    word-break: break-all;
    line-height: 1.5;
  }

  .url-preview .highlight { color: var(--gold); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    border: 1px solid transparent;
    padding: 9px 20px;
    white-space: nowrap;
    height: 36px;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--navy);
  }

  .btn-primary:hover { background: var(--gold-lt); }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border-color: var(--border);
    padding: 5px 10px;
    font-size: 11px;
    height: auto;
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--border-lt); }

  .btn-danger {
    background: transparent;
    color: var(--dim);
    border-color: transparent;
    padding: 5px 8px;
    height: auto;
  }

  .btn-danger:hover { color: var(--danger-lt); }

  /* LINKS TABLE */
  .links-panel {
    background: var(--slate);
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .links-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .links-count {
    font-size: 11px;
    color: var(--dim);
  }

  .filter-bar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
  }

  .filter-bar input {
    width: 100%;
    background: var(--slate-el);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    height: 32px;
  }

  .filter-bar input:focus { border-color: var(--gold); }
  .filter-bar input::placeholder { color: var(--dim); }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  col.col-label   { width: 22%; }
  col.col-campaign{ width: 14%; }
  col.col-short   { width: 16%; }
  col.col-full    { width: 30%; }
  col.col-date    { width: 10%; }
  col.col-actions { width: 8%; }

  thead th {
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--slate-el); }

  td {
    padding: 12px 16px;
    vertical-align: middle;
    overflow: hidden;
  }

  .td-label {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .td-sub {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .td-campaign {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .td-url {
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .td-short {
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .td-date {
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
  }

  .td-actions {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .empty-state {
    padding: 48px 20px;
    text-align: center;
    color: var(--dim);
    font-size: 13px;
  }

  .empty-state p {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .loading-row td {
    padding: 32px;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--slate-el);
    border: 1px solid var(--border-lt);
    border-left: 3px solid var(--gold);
    border-radius: 2px;
    padding: 12px 18px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="wordmark">Apex <span>Systematic</span></div>
  <div class="hd"></div>
  <div class="tool-label">UTM Link Generator</div>
</header>

<main>

  <!-- GENERATOR -->
  <div class="gen-panel">
    <div class="panel-header">
      <span class="panel-label">Generate Link</span>
    </div>
    <div class="gen-body">
      <div class="field">
        <label>Label</label>
        <input type="text" id="label" placeholder="e.g. Accounting report — post 1" />
      </div>
      <div class="field">
        <label>Base URL</label>
        <input type="url" id="baseUrl" placeholder="https://www.apexsystematic.com/..." />
      </div>
      <div class="field">
        <label>Campaign</label>
        <input type="text" id="campaign" placeholder="e.g. accounting-report" />
      </div>
      <div class="field">
        <label>Content</label>
        <input type="text" id="content" placeholder="e.g. post-w21-1" />
      </div>
      <div class="field" style="display:none;">
        <label>Source</label>
        <input type="text" id="source" value="linkedin" />
      </div>
      <div class="field" style="display:none;">
        <label>Medium</label>
        <input type="text" id="medium" value="organic" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-primary" id="saveBtn" onclick="saveLink()" disabled>Save Link</button>
      </div>
    </div>
    <div class="preview-row">
      <span class="preview-label">Preview</span>
      <div class="url-preview" id="urlPreview">
        <span style="color:var(--dim);">URL preview will appear here.</span>
      </div>
    </div>
  </div>

  <!-- SAVED LINKS -->
  <div class="links-panel">
    <div class="links-header">
      <span class="panel-label">Saved Links</span>
      <span class="links-count" id="linksCount"></span>
    </div>
    <div class="filter-bar">
      <input type="text" id="filterInput" placeholder="Filter by label, campaign, or URL…" oninput="filterLinks()" />
    </div>
    <div style="overflow-x:auto;">
      <table>
        <colgroup>
          <col class="col-label" />
          <col class="col-campaign" />
          <col class="col-short" />
          <col class="col-full" />
          <col class="col-date" />
          <col class="col-actions" />
        </colgroup>
        <thead>
          <tr>
            <th>Label</th>
            <th>Campaign</th>
            <th>Short URL</th>
            <th>Full URL</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="linksBody">
          <tr class="loading-row"><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  let allLinks = [];
  const WORKER_URL = 'https://utm-links-api.apexsystematic.workers.dev';

  window.addEventListener('DOMContentLoaded', () => {
    fetchLinks();
    ['baseUrl','source','medium','campaign','content','label'].forEach(id => {
      document.getElementById(id).addEventListener('input', updatePreview);
    });
  });

  function buildURL() {
    const base = document.getElementById('baseUrl').value.trim().replace(/\?.*$/, '');
    if (!base) return '';
    const params = new URLSearchParams();
    const source   = document.getElementById('source').value.trim();
    const medium   = document.getElementById('medium').value.trim();
    const campaign = document.getElementById('campaign').value.trim();
    const content  = document.getElementById('content').value.trim();
    if (source)   params.set('utm_source', source);
    if (medium)   params.set('utm_medium', medium);
    if (campaign) params.set('utm_campaign', campaign);
    if (content)  params.set('utm_content', content);
    return base + (params.toString() ? '?' + params.toString() : '');
  }

  function updatePreview() {
    const url = buildURL();
    const preview = document.getElementById('urlPreview');
    const btn = document.getElementById('saveBtn');
    if (!url) {
      preview.innerHTML = '<span style="color:var(--dim);">URL preview will appear here.</span>';
      btn.disabled = true;
      return;
    }
    const [base, query] = url.split('?');
    preview.innerHTML = base + (query ? '?<span class="highlight">' + query + '</span>' : '');
    btn.disabled = !document.getElementById('label').value.trim();
  }

  async function fetchLinks() {
    try {
      const res = await fetch(WORKER_URL + '/links');
      if (!res.ok) throw new Error();
      allLinks = await res.json();
      renderLinks(allLinks);
    } catch {
      renderLinks([]);
      showToast('Could not load links — check Worker.');
    }
  }

  async function saveLink() {
    const label = document.getElementById('label').value.trim();
    const url   = buildURL();
    if (!label || !url) return;

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch(WORKER_URL + '/links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          label,
          url,
          campaign: document.getElementById('campaign').value.trim(),
          content:  document.getElementById('content').value.trim(),
        }),
      });
      if (!res.ok) throw new Error();
      const link = await res.json();
      allLinks.unshift(link);
      renderLinks(allLinks);
      showToast(link.shortUrl ? 'Link saved and shortened.' : 'Link saved. Short URL unavailable.');
      document.getElementById('label').value = '';
      document.getElementById('content').value = '';
      document.getElementById('baseUrl').value = '';
      document.getElementById('campaign').value = '';
      updatePreview();
    } catch {
      showToast('Failed to save. Check Worker connection.');
    } finally {
      btn.textContent = 'Save Link';
      btn.disabled = false;
    }
  }

  async function deleteLink(id) {
    try {
      const res = await fetch(WORKER_URL + '/links/' + id, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      allLinks = allLinks.filter(l => l.id !== id);
      renderLinks(allLinks);
      showToast('Link deleted.');
    } catch {
      showToast('Failed to delete.');
    }
  }

  function copyLink(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });
  }

  function filterLinks() {
    const q = document.getElementById('filterInput').value.toLowerCase();
    const filtered = q
      ? allLinks.filter(l =>
          (l.label || '').toLowerCase().includes(q) ||
          (l.campaign || '').toLowerCase().includes(q) ||
          (l.url || '').toLowerCase().includes(q)
        )
      : allLinks;
    renderLinks(filtered, true);
  }

  function renderLinks(links, filtered) {
    const tbody   = document.getElementById('linksBody');
    const counter = document.getElementById('linksCount');

    counter.textContent = allLinks.length
      ? allLinks.length + ' link' + (allLinks.length !== 1 ? 's' : '')
      : '';

    if (!links.length) {
      tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state">
          <p>${filtered ? 'No results' : 'No links yet'}</p>
          <span>${filtered ? 'Try a different search.' : 'Generate your first link using the form above.'}</span>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = links.map(l => {
      const dateStr = new Date(l.created).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' });
      const copyTarget = l.shortUrl || l.url;
      const shortDisplay = l.shortUrl
        ? `<div class="td-short">${esc(l.shortUrl)}</div>`
        : `<div style="font-size:11px;color:var(--dim);">—</div>`;

      return `<tr>
        <td>
          <div class="td-label">${esc(l.label)}</div>
          ${l.content ? `<div class="td-sub">${esc(l.content)}</div>` : ''}
        </td>
        <td><div class="td-campaign">${esc(l.campaign || '—')}</div></td>
        <td>${shortDisplay}</td>
        <td><div class="td-url" title="${esc(l.url)}">${esc(l.url)}</div></td>
        <td><div class="td-date">${dateStr}</div></td>
        <td>
          <div class="td-actions">
            <button class="btn btn-ghost" onclick="copyLink('${esc(copyTarget)}',this)">Copy</button>
            <button class="btn btn-danger" onclick="deleteLink('${esc(l.id)}')" title="Delete">✕</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
