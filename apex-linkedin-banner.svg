<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">

  <!-- Background -->
  <rect width="1584" height="396" fill="#0E1117"></rect>

  <!-- Subtle grid lines -->
  <g stroke="#FFFFFF" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="66" x2="1584" y2="66"></line>
    <line x1="0" y1="132" x2="1584" y2="132"></line>
    <line x1="0" y1="198" x2="1584" y2="198"></line>
    <line x1="0" y1="264" x2="1584" y2="264"></line>
    <line x1="0" y1="330" x2="1584" y2="330"></line>
    <line x1="264" y1="0" x2="264" y2="396"></line>
    <line x1="528" y1="0" x2="528" y2="396"></line>
    <line x1="792" y1="0" x2="792" y2="396"></line>
    <line x1="1056" y1="0" x2="1056" y2="396"></line>
    <line x1="1320" y1="0" x2="1320" y2="396"></line>
  </g>

  <!-- Accent line left -->
  <line x1="72" y1="0" x2="72" y2="396" stroke="#C9A84C" stroke-width="1.5" opacity="0.25"></line>

  <!-- Logo mark — triangle -->
  <line x1="152" y1="148" x2="112" y2="218" stroke="#FFFFFF" stroke-width="3" stroke-linecap="square"></line>
  <line x1="152" y1="148" x2="192" y2="218" stroke="#FFFFFF" stroke-width="3" stroke-linecap="square"></line>
  <line x1="112" y1="218" x2="192" y2="218" stroke="#FFFFFF" stroke-width="3" stroke-linecap="square"></line>
  <circle cx="152" cy="148" r="4" fill="#C9A84C"></circle>

  <!-- APEX wordmark -->
  <text x="218" y="216" font-family="Georgia, serif" font-size="72" font-weight="400" letter-spacing="14" fill="#FFFFFF">APEX</text>

  <!-- SYSTEMATIC -->
  <text x="220" y="244" font-family="&#39;Helvetica Neue&#39;, Arial, sans-serif" font-size="15" font-weight="300" letter-spacing="13" fill="#C9A84C">SYSTEMATIC</text>

  <!-- Divider -->
  <line x1="560" y1="148" x2="560" y2="258" stroke="#FFFFFF" stroke-width="0.8" opacity="0.2"></line>

