  <!-- Decorative corner lines bottom right -->
  <line x1="1520" y1="396" x2="1584" y2="396" stroke="#C9A84C" stroke-width="1.5" opacity="0.3"></line>
  <line x1="1584" y1="340" x2="1584" y2="396" stroke="#C9A84C" stroke-width="1.5" opacity="0.3"></line>

