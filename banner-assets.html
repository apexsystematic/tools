<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Systematic — Banner Assets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0c10;
      color: #e8e4dc;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 60px 40px;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 64px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 28px;
    }

    header h1 {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
    }

    header span {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #C9A84C;
      text-transform: uppercase;
    }

    .asset-group {
      margin-bottom: 80px;
    }

    .asset-group-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 32px;
    }

    .asset-group-header h2 {
      font-family: Georgia, serif;
      font-size: 16px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255,255,255,0.85);
    }

    .asset-group-header .dims {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    .asset-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .asset-card {
      background: #0E1117;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .asset-card-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .asset-card-label .format {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #C9A84C;
    }

    .asset-card-label a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .asset-card-label a:hover {
      color: rgba(255,255,255,0.7);
    }

    .asset-preview {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080a0e;
    }

    .asset-preview img,
    .asset-preview svg,
    .asset-preview object {
      width: 100%;
      height: auto;
      display: block;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin: 0 0 80px 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Apex Systematic</h1>
    <span>Banner Assets</span>
  </header>

  <!-- ── OG IMAGE V1 ── -->
  <div class="asset-group">
    <div class="asset-group-header">
      <h2>OG Image — Professional Services</h2>
      <span class="dims">1200 × 630 px</span>
    </div>
    <div class="asset-row">
      <div class="asset-card">
        <div class="asset-card-label">
          <span class="format">SVG</span>
          <a href="og-image-v1.svg" download>Download</a>
        </div>
        <div class="asset-preview">
          <img src="og-image-v1.svg" alt="OG Image V1 SVG">
        </div>
      </div>
      <div class="asset-card">
        <div class="asset-card-label">
          <span class="format">PNG</span>
          <a href="og-image-v1.png" download>Download</a>
        </div>
        <div class="asset-preview">
          <img src="og-image-v1.png" alt="OG Image V1 PNG">
        </div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- ── OG IMAGE V2 ── -->
  <div class="asset-group">
    <div class="asset-group-header">
      <h2>OG Image — Professional Services &amp; Growing Businesses</h2>
      <span class="dims">1200 × 630 px</span>
    </div>
    <div class="asset-row">
      <div class="asset-card">
        <div class="asset-card-label">
          <span class="format">SVG</span>
          <a href="og-image-v2.svg" download>Download</a>
        </div>
        <div class="asset-preview">
          <img src="og-image-v2.svg" alt="OG Image V2 SVG">
        </div>
      </div>
      <div class="asset-card">
        <div class="asset-card-label">
          <span class="format">PNG</span>
          <a href="og-image-v2.png" download>Download</a>
        </div>
        <div class="asset-preview">
          <img src="og-image-v2.png" alt="OG Image V2 PNG">
        </div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- ── LINKEDIN BANNER ── -->
  <div class="asset-group">
    <div class="asset-group-header">
      <h2>LinkedIn Banner</h2>
      <span class="dims">1584 × 396 px</span>
    </div>
    <div class="asset-row">
      <div class="asset-card">
        <div class="asset-card-label">
          <span class="format">SVG</span>
          <a href="apex-linkedin-banner.svg" download>Download</a>
        </div>
        <div class="asset-preview">
          <img src="apex-linkedin-banner.svg" alt="LinkedIn Banner SVG">
        </div>
      </div>
      <div class="asset-card">
        <div class="asset-card-label">
          <span class="format">PNG</span>
          <a href="apex-linkedin-banner.png" download>Download</a>
        </div>
        <div class="asset-preview">
          <img src="apex-linkedin-banner.png" alt="LinkedIn Banner PNG">
        </div>
      </div>
    </div>
  </div>

</body>
</html>
